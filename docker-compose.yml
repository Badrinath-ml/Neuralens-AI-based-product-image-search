services:
  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    volumes:
      - backend-data:/app/media_storage
      - backend-db:/app
    restart: unless-stopped

  frontend:
    build: ./Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-db:
